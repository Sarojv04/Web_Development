<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Rock Paper Scissors </title>

</head>

<body>
    <p> <h1>Rock Paper Scissors </h1></p>
    <button onclick = "
        finalResult('Rock');
    "> Rock</button>

    <button onclick = "
        finalResult('Paper');
    "> Paper</button>

    <button onclick = "
        finalResult('Scissors');
    "> Scissors </button>

    <script>
      
     function computerMoveResult()
     {
        const randomNumber = Math.random();
        let computerMove = '';

        if (randomNumber >=0 && randomNumber < 1/3)
            { computerMove ='Rock';}
        else if (randomNumber >= 1/3 && randomNumber < 2/3 )
            {  computerMove ='Paper';}
        else if (randomNumber >= 2/3 && randomNumber < 1 )
            { computerMove ='Scissors';}
        
        return computerMove ;
     }

     function finalResult(playerMove)
     {
        const computerMove = computerMoveResult()
        let result = '';
        if (playerMove === 'Scissors')
        {
            if(computerMove === 'Paper')
                { result = ' You Win'}
            else if(computerMove === 'Rock')
                { result = ' You lose'}
            else if(computerMove === 'Scissors')
                { result = ' Tie'}
        } 
        else if (playerMove === 'Paper')
        {
            if(computerMove === 'Paper')
                { result = ' Tie'}
                else if(computerMove === 'Rock')
                    { result = ' You Win'}
                else if(computerMove === 'Scissors')
                    { result = ' You lose'}

        } 
        else if (playerMove === 'Rock')
        {
            if(computerMove === 'Rock')
                { result = ' Tie'}
            else if(computerMove === 'Paper')
                { result = ' You loss'}
            else if(computerMove === 'Scissors')
                { result = ' You Win'}
        }

        alert(`You Picked ${playerMove}. Computer picked ${computerMove}... Result: ${result}`);
    }

    </script>
    
</body>
</html>
