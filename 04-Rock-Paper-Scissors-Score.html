<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Rock Paper Scissors </title>

</head>

<body>
    <p> <h1>Rock Paper Scissors </h1></p>
    <button onclick = "
        finalResult('Rock');
    "> Rock</button>

    <button onclick = "
        finalResult('Paper');
    "> Paper</button>

    <button onclick = "
        finalResult('Scissors');
    "> Scissors </button>

    <button onclick="restScore();"
    > Reset</button>

    <script>

        let score = JSON.parse(localStorage.getItem('score'))

        if (score === null)
            {
                score = {
                Win : 0, 
                loss : 0,
                tie : 0
             
                       }       
            }
        
        ;
        
        function computerMoveResult()
        {
            const randomNumber = Math.random();
            let computerMove = '';

            if (randomNumber >=0 && randomNumber < 1/3)
                { computerMove ='Rock';}
            else if (randomNumber >= 1/3 && randomNumber < 2/3 )
                {  computerMove ='Paper';}
            else if (randomNumber >= 2/3 && randomNumber < 1 )
                { computerMove ='Scissors';}
            
            return computerMove ;
        }

     function finalResult(playerMove)
     {
        const computerMove = computerMoveResult()
        let result = '';
        if (playerMove === 'Scissors')
        {
            if(computerMove === 'Paper')
                { result = 'You Win.'}
            else if(computerMove === 'Rock')
                { result = 'You lose.'}
            else if(computerMove === 'Scissors')
                { result = 'Tie.'}
        } 
        else if (playerMove === 'Paper')
        {
            if(computerMove === 'Paper')
                { result = 'Tie.'}
                else if(computerMove === 'Rock')
                    { result = 'You Win.'}
                else if(computerMove === 'Scissors')
                    { result = 'You lose.'}

        } 
        else if (playerMove === 'Rock')
        {
            if(computerMove === 'Rock')
                { result = 'Tie.'}
            else if(computerMove === 'Paper')
                { result = 'You lose.'}
            else if(computerMove === 'Scissors')
                { result = 'You Win.'}
        }

        if (result === 'Tie.')
        {
            score.tie = score.tie + 1;
        } else if (result === 'You Win.')
        {
            score.Win = score.Win + 1;
        } else if (result === 'You lose.')
        {
            score.loss = score.loss + 1;
        }

        localStorage.setItem('score', JSON.stringify(score));

        alert(`You Picked ${playerMove}. Computer picked ${computerMove}... Result: ${result}
        
        score: Win - ${score.Win } Loss - ${score.loss } Tie - ${score.tie}`);
    }

        function restScore()
        {
            score.Win = 0;
            score.tie = 0;
            score.loss = 0;
            localStorage.removeItem('score');
        }

 
    </script>
    
</body>
</html>
